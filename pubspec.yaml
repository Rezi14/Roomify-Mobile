name: roomify_mobile
description: Roomify Hotel Booking Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # HTTP Client
  http: ^1.2.2

  # Secure Storage untuk token Sanctum
  flutter_secure_storage: ^9.2.3

  # Intl untuk format tanggal & mata uang (Rupiah)
  intl: ^0.19.0

  # Icon
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0

  # Image Picker (untuk upload foto tipe kamar admin)
  image_picker: ^1.1.2

  # Pull to Refresh
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700